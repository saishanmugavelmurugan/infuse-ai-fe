<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFUSE-AI Private Limited - Letterhead</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            width: 210mm;
            min-height: 297mm;
            margin: 0 auto;
            background: white;
            position: relative;
        }
        
        .page {
            width: 210mm;
            min-height: 297mm;
            position: relative;
            background: white;
        }
        
        /* Watermark */
        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 0.08;
            z-index: 0;
            pointer-events: none;
        }
        
        .watermark svg {
            width: 200mm;
            height: 200mm;
        }
        
        /* Header Section */
        .header {
            text-align: center;
            padding: 15mm 20mm 8mm 20mm;
            position: relative;
            z-index: 1;
        }
        
        .logo-container {
            margin-bottom: 3mm;
        }
        
        .logo-container svg {
            width: 18mm;
            height: 18mm;
        }
        
        .company-name {
            font-size: 28pt;
            font-weight: 800;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #EF4444 0%, #F97316 50%, #F59E0B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 2mm;
        }
        
        .company-details {
            font-size: 9pt;
            color: #333;
            font-weight: 600;
        }
        
        .company-details span {
            margin: 0 3mm;
        }
        
        /* Header Line */
        .header-line {
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, #EF4444, #F97316, #F59E0B);
            margin-top: 5mm;
        }
        
        /* Content Area */
        .content-area {
            padding: 15mm 25mm;
            min-height: 200mm;
            position: relative;
            z-index: 1;
        }
        
        /* Footer Section */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 1;
        }
        
        .footer-address {
            text-align: right;
            padding: 0 25mm 3mm 25mm;
            font-size: 9pt;
            color: #333;
            line-height: 1.5;
            font-weight: 500;
        }
        
        /* Straight Footer Lines */
        .footer-lines {
            width: 100%;
        }
        
        .footer-line {
            height: 4mm;
            width: 100%;
        }
        
        .footer-line-1 {
            background: #F59E0B;
        }
        
        .footer-line-2 {
            background: #F97316;
        }
        
        .footer-line-3 {
            background: #EF4444;
        }
        
        @media print {
            body {
                -webkit-print-color-adjust: exact !important;
                print-color-adjust: exact !important;
            }
        }
    </style>
</head>
<body>
    <div class="page">
        <!-- Watermark -->
        <div class="watermark">
            <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <!-- Hexagon background -->
                <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="#F59E0B" opacity="0.3"/>
                <!-- Inner hexagon -->
                <polygon points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" fill="#F97316" opacity="0.4"/>
                <!-- F Letter -->
                <text x="50" y="62" text-anchor="middle" font-size="35" font-weight="bold" fill="#EF4444" font-family="Arial, sans-serif">F</text>
                <!-- Decorative lines -->
                <line x1="35" y1="35" x2="65" y2="35" stroke="#F97316" stroke-width="3"/>
            </svg>
        </div>
        
        <!-- Header -->
        <div class="header">
            <div class="logo-container">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <!-- Hexagon background -->
                    <polygon points="50,5 90,27.5 90,72.5 50,95 10,72.5 10,27.5" fill="#F59E0B"/>
                    <!-- Inner hexagon -->
                    <polygon points="50,15 80,32.5 80,67.5 50,85 20,67.5 20,32.5" fill="#F97316"/>
                    <!-- F Letter -->
                    <text x="50" y="62" text-anchor="middle" font-size="35" font-weight="bold" fill="white" font-family="Arial, sans-serif">F</text>
                    <!-- Decorative lines -->
                    <line x1="35" y1="35" x2="65" y2="35" stroke="white" stroke-width="3"/>
                </svg>
            </div>
            <div class="company-name">INFUSE-AI PRIVATE LIMITED</div>
            <div class="company-details">
                Identity Number: U62011HR2026PTC140177<br>
                Pan No.: AAICI6135M <span>/</span> Tan No.: RTKI06194G
            </div>
            <div class="header-line"></div>
        </div>
        
        <!-- Content Area -->
        <div class="content-area">
            <!-- Your letter content goes here -->
        </div>
        
        <!-- Footer -->
        <div class="footer">
            <div class="footer-address">
                1 G-Floor Tower P1 Sec 65,<br>
                Emaar Emerald Estate, Badshahpur,<br>
                Gurgaon- 122101, Haryana
            </div>
            <div class="footer-lines">
                <div class="footer-line footer-line-1"></div>
                <div class="footer-line footer-line-2"></div>
                <div class="footer-line footer-line-3"></div>
            </div>
        </div>
    </div>
</body>
</html>
